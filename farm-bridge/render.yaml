services:
  - type: cron
    name: farm-bridge
    runtime: node
    rootDir: farm-bridge
    buildCommand: npm install
    startCommand: node bridge.js
    schedule: "0 6 * * *"
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DROPBOX_FEEDLYNC_PATH
        value: /Farm/FeedLync
      - key: DROPBOX_DAIRYCOMP_PATH
        value: /Farm/DairyComp
      - key: DROPBOX_OUTBOX_PATH
        value: /Farm/Summaries
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_RECIPIENT
        sync: false
