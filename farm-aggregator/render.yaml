services:
  - type: cron
    name: farm-pulse
    runtime: node
    rootDir: farm-aggregator
    buildCommand: npm install
    startCommand: node scripts/run-pulse.js
    schedule: "0 * * * *"
    plan: free
    envVars: &env
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGREFINE_API_URL
        value: https://ag-refine.onrender.com/api
      - key: AGREFINE_API_KEY
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DROPBOX_INBOX_PATH
        value: /Farm/Inbox
      - key: DROPBOX_OUTBOX_PATH
        value: /Farm/Summaries
      - key: DROPBOX_DAIRYCOMP_PATH
        value: /Farm/DairyComp
      - key: DROPBOX_FEEDLYNC_PATH
        value: /Farm/FeedLync
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_RECIPIENT
        sync: false
      - key: TOMTOM_API_KEY
        sync: false

  - type: cron
    name: farm-daily-digest
    runtime: node
    rootDir: farm-aggregator
    buildCommand: npm install
    startCommand: node scripts/run-daily.js
    schedule: "0 6 * * *"
    plan: free
    envVars: *env

  - type: cron
    name: farm-weekly-summary
    runtime: node
    rootDir: farm-aggregator
    buildCommand: npm install
    startCommand: node scripts/run-weekly.js
    schedule: "0 6 * * 1"
    plan: free
    envVars: *env
